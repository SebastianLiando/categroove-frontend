<div class="w-fit">
  <p-card class="text-center">
    <ng-template #header>
      <div class="flex items-center justify-around">
        <app-equalizer class="w-8 h-8" [barCount]="6"/>
        <p-image [src]="getLogoSrc()" alt="Categroove Logo" class="block min-w-3xs w-2/5 pt-12 pb-6"/>
        <app-equalizer class="w-8 h-8" [barCount]="6"/>
      </div>
    </ng-template>

    <h4 class="font-semibold text-2xl mb-2">Organize music your way</h4>
    <p class="text-muted-color mb-6">Create and manage playlists with your very own custom tags</p>

    @if (loading()) {
      <p-button class="spotify-button" loading label="Redirecting to Spotify..." />
    } @else {
      <p-button class="spotify-button" (onClick)="navigateToSpotifyLogin()">
        <app-spotify-icon class="w-6 text-white"/>
        Continue with Spotify
        <span class="pi pi-arrow-right text-xs"></span>
      </p-button>
    }

    <div class="mt-4 mb-12 flex flex-row justify-center items-center text-muted-color gap-2">
      <span>Powered by </span>
      <app-spotify-with-text-icon class="w-18"/>
    </div>
  </p-card>
</div>
